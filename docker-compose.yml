version: '3.8'

services:
  # 1. Banco de Dados SQL Server
  mssql-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: mssql-db
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=SuaSenhaSuperSegura123!
    ports:
      - "1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql
    restart: always

  # 2. Servidor Backend (API em Node.js/Express)
  backend-api:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: backend-api
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
      - DB_HOST=mssql-db
      - DB_PORT=1433
      - DB_USER=sa
      - DB_PASSWORD=SuaSenhaSuperSegura123!
      - DB_NAME=GrdChecklistDB
      - DB_ENCRYPT=false
    depends_on:
      - mssql-db
    restart: always

  # 3. Frontend React (Servido por Nginx com Proxy Reverso para o Backend)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: frontend-nginx
    ports:
      - "8080:80"
    depends_on:
      - backend-api
    restart: always

volumes:
  mssql-data:
